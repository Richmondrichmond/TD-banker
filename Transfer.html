<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=.0">
  <title>Business Account Transfer</title>

  <!-- Google Font: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@150;250;300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #043D33;
      color: rgb(255, 255, 255);
      max-width: 100vw;
      overflow-x: hidden;
    }
     /* Transparent Header */
     header {
            background-color: rgba(0, 107, 18, 0.8); /* Green with slight transparency */
            backdrop-filter: blur(5px);
            color: rgb(119, 141, 23);
            padding: 15px 0px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        header .logo img {
            width: 180px;
            
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            display: inline;
        }

        /* Modern Buttons */
        .nav-button {
            padding: 10px 35px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: 0.3s ease-in-out;
            background: linear-gradient(135deg, #00b64f, #00802b);
            color: rgba(7, 1, 1, 0.945);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .nav-button:hover {
            background: linear-gradient(135deg, #00d956, #009431);
            transform: scale(1.05);
        }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px;
      background: rgba(4, 61, 51, 0.7);
      backdrop-filter: blur(8px);
      color: white;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      font-size: 16px;
    }

    .user-info {
      display: flex;
      align-items: center;
    }

    .user-icon {
      width: 25px;
      height: 25px;
      background-color: rgba(255, 255, 255, 0.991);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #043D33;
      font-weight: bold;
      margin-left: 10px;
      cursor: pointer;
    }

    .user-icon a {
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
    }

    .back-icon {
      color: rgb(255, 255, 255);
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
    }

    .transfer-section {
      text-align: center;
      padding: 80px 15px 15px;
    }

    .transfer-section h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .transfer-form {
      background: #ffffffab;
      color: #000;
      padding: 15px;
      border-radius: 12px;
      max-width: 350px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .transfer-form label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .transfer-form input, .transfer-form select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .button {
      background: linear-gradient(135deg, #14a76c, #0E5D26);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      flex: 1;
      margin: 3px;
    }

    .button:hover {
      background: linear-gradient(135deg, #0E5D26, #14a76c);
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="user-info">
      <span>Thomas</span>
      <div class="user-icon"><a href="profile.html">T</a></div>
    </div>
    <a><button onclick="window.location.href='Amountpage1.html';" class="nav-button">Back</button></a>
  </div>

  <div class="transfer-section">
    <h1>Transfer Money</h1>
    <div class="transfer-form">
      <label for="account">Recipient Account:</label>
      <input type="text" id="account" placeholder="Enter account number">
      
      <label for="routing">Routing Number:</label>
      <input type="text" id="routing" placeholder="Enter routing number">
      
      <label for="amount">Amount:</label>
      <input type="number" id="amount" placeholder="Enter amount">
      
      <label for="currency">Currency:</label>
      <select id="currency">
        <option value="USD">USD - US Dollar</option>
        <option value="EUR">EUR - Euro</option>
        <option value="GBP">GBP - British Pound</option>
        <option value="JPY">JPY - Japanese Yen</option>
      </select>
      
      <label for="notes">Transaction Notes:</label>
      <input type="text" id="notes" placeholder="Enter transaction details">
      
      <div class="buttons">
        <button class="button">Transfer</button>
        <button class="button" onclick="window.location.href='dashboard.html';">Cancel</button>
      </div>
    </div>
  </div>
</body>
</html>
