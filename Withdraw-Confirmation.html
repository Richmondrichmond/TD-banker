<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdrawal Confirmation</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@50;150;300&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #043D33;
      color: rgba(255, 255, 255, 0.9);
      text-align: center;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(4, 61, 51, 0.7);
      backdrop-filter: blur(8px);
      color: white;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      font-size: 18px;
    }
    .container {
      padding: 100px 20px 20px;
      max-width: 500px;
      margin: auto;
      background: rgba(103, 97, 97, 0.9);
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      color: black;
    }
    .confirmation-message {
      font-size: 18px;
      margin-top: 20px;
      color: white;
    }
    .button {
      background: #14a76c;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
      text-decoration: none;
      display: inline-block;
    }
    .button:hover {
      background: #0E5D26;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>Hi, Thomas!</span>
  </div>
  
  <div class="container">
    <h1>Withdrawal Confirmed</h1>
    <p class="confirmation-message">Your withdrawal request has been successfully submitted.</p>
    <p class="confirmation-message">Amount: <strong>$500.00</strong></p>
    <p class="confirmation-message">Fee Deducted: <strong>$25.00</strong></p>
    <p class="confirmation-message">Sending Code to Phone:***90 <strong>Verify</strong></p>
    
    <a href="index.html" class="button">Send</a>
  </div>
</body>
</html>
