<!-- ✅ Include EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<!-- ✅ EmailJS Form Script -->
<script>
  // Initialize EmailJS with your PUBLIC KEY
  (function () {
    emailjs.init("PH99tzwnPFWMluwBR"); // ✅ Replace with your actual public key
  })();

  document.getElementById("contact-form").addEventListener("submit", function (event) {
    event.preventDefault();

    const btn = event.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Sending...';

    emailjs
      .sendForm("service_ylplc7g", "template_7nteemk", this) // ✅ Make sure this is correct
      .then(
        () => {
          btn.innerHTML = '<i class="fas fa-check mr-2"></i> Message Sent!';
          setTimeout(() => {
            this.reset();
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Send Message';
          }, 2000);
        },
        (error) => {
          console.error("Failed to send message:", error);
          btn.innerHTML = '<i class="fas fa-times mr-2"></i> Error! Try Again';
          btn.disabled = false;
        }
      );
  });
</script>
