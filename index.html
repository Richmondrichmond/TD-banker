<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TD Bank | Your Trusted Financial Partner</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }

        /* Transparent Header */
        header {
            background-color: rgba(0, 107, 18, 0.8); /* Green with slight transparency */
            backdrop-filter: blur(5px);
            color: rgb(119, 141, 23);
            padding: 15px 0px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        header .logo img {
            width: 180px;
            
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            display: inline;
        }

        /* Modern Buttons */
        .nav-button {
            padding: 10px 35px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: 0.3s ease-in-out;
            background: linear-gradient(135deg, #00b64f, #00802b);
            color: rgba(7, 1, 1, 0.945);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .nav-button:hover {
            background: linear-gradient(135deg, #00d956, #009431);
            transform: scale(1.05);
        }

        /* Hero Section */
        .hero {
            background: url('Family.png') no-repeat center/cover;
            height: 90vh;
            color: rgb(107, 131, 20);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: left;
            text-align: left;
            padding: 150px;
            margin-top: 80px; /* Prevents header overlap */
        }

        .hero h1 {
            font-size: 3rem;
            margin: 0;
        }

        .hero p {
            font-size: 1.2rem;
            margin: 15px 0;
        }

        .hero .cta-buttons a {
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s ease-in-out;
            margin-right: 10px;
            display: inline-block;
        }

        .hero .cta-buttons .cta-primary {
            background: #007b27;
            color: white;
        }

        .hero .cta-buttons .cta-primary:hover {
            background: #00591d;
        }

        .hero .cta-buttons .cta-secondary {
            background: white;
            color: #007b27;
            border: 2px solid #007b27;
        }

        .hero .cta-buttons .cta-secondary:hover {
            background: #007b27;
            color: white;
        }

        /* Icon Section */
        .icons {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 30px 0;
        }

        .icon-box {
            text-align: center;
            padding: 20px;
            background: #f4f4f4;
            border-radius: 15px;
            width: 150px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
        }

        .icon-box i {
            font-size: 30px;
            color: #007b27;
        }

        .icon-box p {
            margin-top: 10px;
            font-size: 1rem;
            font-weight: bold;
        }

        /* Footer */
        footer {
            background: #004b1c;
            color: white;
            text-align: center;
            padding: 15px 0;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="tdb-tag-white-en.png" alt="TD Bank Logo">
        </div>
        <nav>
            <ul>
                <li><button onclick="window.location.href='Services.html';" class="nav-button">Services</button></li>
                <li><button onclick="window.location.href='About Us.html';" class="nav-button">About Us</button></li>
                <li><button onclick="window.location.href='Contact.html';" class="nav-button">Contact</button></li>
                <li><button onclick="window.location.href='loginpage2.html';" class="nav-button">Login</button></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <div class="hero">
        <h1>Welcome to TD Bank</h1>
        <p>Your Trusted Financial Partner for Personal and Business Banking</p>
        <div class="cta-buttons">
            <a><button onclick="window.location.href='About Us.html';" class="nav-button">About Us</button></a>
            <a href="learnmore.html" class="cta-secondary">Learn More</a>
        </div>
    </div>

    <!-- Icons Section -->
    <div class="icons">
        <div class="icon-box">
            <i>🏦</i>
            <p>Banking Services</p>
        </div>
        <div class="icon-box">
            <i>💳</i>
            <p>Credit Cards</p>
        </div>
        <div class="icon-box">
            <i>📈</i>
            <p>Investments</p>
        </div>
        <div class="icon-box">
            <i>💼</i>
            <p>Business Solutions</p>
        </div>
    </div>
    

    <!-- Footer -->
    <footer>
        <p>© 2025 TD Bank. All Rights Reserved.Contact email:tdcustomerservice667@gmail.com
            </p>
    </footer>

</body>
</html>
