<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coone Bank — Card Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #050b14 0%, #0a1225 100%); color: #eef2ff; }
    :root { --electric: #2b6ef0; --emerald: #10b981; --gold: #f5b041; --coral: #f97373; --card-bg: rgba(12,22,40,0.75); --border-glow: rgba(59,130,246,0.25); }
    .container { max-width: 1440px; margin: 0 auto; padding: 24px 28px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 32px; border-bottom: 1px solid var(--border-glow); padding-bottom: 16px; }
    .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #FFF, #80b3ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .cards-badge { background: linear-gradient(135deg, #f5b04120, #2b6ef020); border: 1px solid rgba(245,176,65,0.4); border-radius: 40px; padding: 6px 14px; font-size: 0.7rem; }
    .user-widget { display: flex; align-items: center; gap: 20px; background: rgba(255,255,255,0.03); padding: 6px 18px; border-radius: 80px; border: 1px solid var(--border-glow); }
    .avatar { width: 44px; height: 44px; background: linear-gradient(145deg, #f5b041, #2b6ef0); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 28px; padding: 20px; border: 1px solid var(--border-glow); }
    .stat-value { font-size: 1.6rem; font-weight: 800; margin: 8px 0; }
    .cards-main { display: flex; flex-wrap: wrap; gap: 28px; }
    .cards-gallery { flex: 2; min-width: 300px; }
    .controls-panel { flex: 1.2; min-width: 280px; }
    .glass-card { background: rgba(8,18,32,0.65); backdrop-filter: blur(14px); border-radius: 32px; padding: 24px; border: 1px solid var(--border-glow); margin-bottom: 24px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 600; }
    .physical-card { background: linear-gradient(135deg, #1a1f2e, #0d1120); border-radius: 24px; padding: 24px; position: relative; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 24px; }
    .card-chip { width: 50px; height: 40px; background: linear-gradient(145deg, #d4af37, #f5b041); border-radius: 12px; margin-bottom: 30px; }
    .card-number { font-size: 1.3rem; letter-spacing: 2px; font-family: monospace; margin: 16px 0; }
    .card-status { position: absolute; bottom: 24px; right: 24px; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; }
    .status-active { background: var(--emerald); }
    .status-frozen { background: var(--coral); }
    .virtual-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 20px; margin-top: 16px; }
    .virtual-card-item { background: rgba(15,26,43,0.8); border-radius: 24px; padding: 20px; border: 1px solid var(--border-glow); }
    .toggle-switch { position: relative; display: inline-block; width: 52px; height: 28px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2d4263; border-radius: 34px; transition: 0.3s; }
    .toggle-slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: 0.3s; }
    input:checked + .toggle-slider { background-color: var(--emerald); }
    input:checked + .toggle-slider:before { transform: translateX(24px); }
    .limit-slider { width: 100%; height: 6px; border-radius: 3px; background: #2d4263; -webkit-appearance: none; }
    .limit-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--electric); cursor: pointer; }
    .btn-primary { background: linear-gradient(105deg, var(--electric), #1a4fcf); border: none; padding: 12px 24px; border-radius: 48px; font-weight: 600; color: white; cursor: pointer; width: 100%; }
    .btn-outline { background: transparent; border: 1px solid var(--electric); padding: 10px 20px; border-radius: 48px; cursor: pointer; color: white; width: 100%; margin-top: 8px; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #0f212e; padding: 12px 24px; border-radius: 48px; border-left: 4px solid var(--emerald); z-index: 1100; animation: slideIn 0.3s; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @media (max-width:768px){ .container{padding:16px;} .card-number{font-size:1rem;} }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="logo">COONE<span style="color:#2b6ef0;">BANK</span> <span style="font-size:0.8rem;">| Cards</span></div>
    <div class="cards-badge"><i class="fas fa-credit-card"></i> Smart Card Control</div>
    <div class="user-widget"><i class="fas fa-bell"></i><div class="avatar">AJ</div><span>Alex James</span></div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div>Total Spend (Month)</div><div class="stat-value" id="totalSpend">$3,842</div></div>
    <div class="stat-card"><div>Active Cards</div><div class="stat-value" id="activeCards">4</div></div>
    <div class="stat-card"><div>Virtual Cards</div><div class="stat-value" id="virtualCount">3</div></div>
    <div class="stat-card"><div>Cashback Earned</div><div class="stat-value">$187</div></div>
  </div>

  <div class="cards-main">
    <div class="cards-gallery">
      <div class="physical-card" id="physicalCard">
        <div class="card-chip"></div>
        <div class="card-network" style="position:absolute; top:24px; right:24px; font-size:2rem;"><i class="fab fa-cc-visa"></i></div>
        <div class="card-number">•••• 4821</div>
        <div class="card-details" style="display:flex; justify-content:space-between;">ALEX JAMES • VALID THRU 09/28</div>
        <div class="card-status" id="cardStatusBadge">Active</div>
      </div>
      <div class="glass-card"><div class="card-header"><span><i class="fas fa-id-card"></i> Virtual Cards</span><button class="btn-outline" id="createVirtualBtn" style="width:auto; padding:8px 16px;">+ New Virtual Card</button></div><div class="virtual-cards-grid" id="virtualCardsGrid"></div></div>
    </div>
    <div class="controls-panel">
      <div class="glass-card"><div class="card-header"><span><i class="fas fa-sliders-h"></i> Controls</span><label class="toggle-switch"><input type="checkbox" id="freezeToggle"><span class="toggle-slider"></span></label></div><p id="freezeStatus">Card is ACTIVE</p><div class="control-group" style="margin:16px 0;"><label>Monthly Limit: $<span id="spendLimitValue">5,000</span></label><input type="range" id="spendLimit" class="limit-slider" min="500" max="25000" step="500" value="5000"></div><div class="control-group"><label>Per Transaction: $<span id="perTxLimitValue">2,500</span></label><input type="range" id="perTxLimit" class="limit-slider" min="100" max="10000" step="100" value="2500"></div><select id="merchantBlock" class="geo-select" style="background:#0f1a2b; border-radius:48px; padding:10px; width:100%;"><option>No restrictions</option><option>Block gambling</option></select><button class="btn-primary" id="applySettingsBtn" style="margin-top:16px;">Apply Settings</button><button class="btn-outline" id="reportLostBtn">Report Lost/Stolen</button></div>
      <div class="glass-card"><div class="card-header"><span><i class="fas fa-shield-alt"></i> Security</span></div><div><i class="fas fa-sync-alt"></i> Dynamic CVV <span style="float:right;" id="dynamicCVV">•••</span></div><button id="refreshCVVBtn" class="btn-outline" style="margin-top:12px;">Refresh CVV</button></div>
    </div>
  </div>
</div>

<script>
  let cardFrozen = false;
  let spendingLimit = 5000, perTxLimit = 2500;
  let dynamicCVV = Math.floor(Math.random()*900+100);
  let virtualCards = [{id:1,name:"Shopping",last4:"2391",frozen:false},{id:2,name:"Subscriptions",last4:"8472",frozen:false}];
  function updateCardUI() { document.getElementById('freezeStatus').innerText = cardFrozen ? "Card is FROZEN" : "Card is ACTIVE"; const badge=document.getElementById('cardStatusBadge'); badge.innerText=cardFrozen?"Frozen":"Active"; badge.className=cardFrozen?"card-status status-frozen":"card-status status-active"; document.getElementById('physicalCard').style.opacity=cardFrozen?"0.7":"1"; document.getElementById('freezeToggle').checked=cardFrozen; }
  function renderVirtualCards() { let html=''; virtualCards.forEach(c=>{ html+=`<div class="virtual-card-item"><i class="fas fa-id-card"></i><div><strong>${c.name}</strong></div><div>•••• ${c.last4}</div><div style="display:flex; justify-content:space-between; margin-top:12px;"><span style="color:${c.frozen?'#f97373':'#10b981'};">${c.frozen?'Frozen':'Active'}</span><button class="toggle-virtual" data-id="${c.id}" style="background:none; border:none; color:#2b6ef0;"><i class="fas ${c.frozen?'fa-play-circle':'fa-pause-circle'}"></i></button></div></div>`; }); document.getElementById('virtualCardsGrid').innerHTML=html; document.querySelectorAll('.toggle-virtual').forEach(btn=>btn.addEventListener('click',(e)=>{ let id=parseInt(btn.getAttribute('data-id')); let card=virtualCards.find(c=>c.id===id); if(card){ card.frozen=!card.frozen; renderVirtualCards(); showToast(`${card.name} card ${card.frozen?'frozen':'activated'}`); updateCounts(); } })); updateCounts(); }
  function updateCounts(){ let activeVirtual=virtualCards.filter(c=>!c.frozen).length; let physicalActive=cardFrozen?0:1; document.getElementById('activeCards').innerText=activeVirtual+physicalActive; document.getElementById('virtualCount').innerText=virtualCards.length; }
  document.getElementById('freezeToggle').addEventListener('change',()=>{ cardFrozen=document.getElementById('freezeToggle').checked; updateCardUI(); showToast(cardFrozen?"Card frozen":"Card activated"); updateCounts(); });
  document.getElementById('spendLimit').addEventListener('input',(e)=>{ spendingLimit=e.target.value; document.getElementById('spendLimitValue').innerText=spendingLimit; });
  document.getElementById('perTxLimit').addEventListener('input',(e)=>{ perTxLimit=e.target.value; document.getElementById('perTxLimitValue').innerText=perTxLimit; });
  document.getElementById('applySettingsBtn').addEventListener('click',()=>showToast(`Limits updated: $${spendingLimit} monthly, $${perTxLimit} per tx`));
  document.getElementById('refreshCVVBtn').addEventListener('click',()=>{ dynamicCVV=Math.floor(Math.random()*900+100); document.getElementById('dynamicCVV').innerText=dynamicCVV; showToast(`New CVV: ${dynamicCVV}`); });
  document.getElementById('reportLostBtn').addEventListener('click',()=>{ if(confirm("Report card lost/stolen?")){ cardFrozen=true; updateCardUI(); showToast("Card reported lost. New card issued."); } });
  document.getElementById('createVirtualBtn').addEventListener('click',()=>{ let name=prompt("Card name:"); if(name){ let newId=virtualCards.length+1; let last4=Math.floor(Math.random()*9000+1000); virtualCards.push({id:newId,name:name,last4:last4,frozen:false}); renderVirtualCards(); showToast(`Virtual card "${name}" created`); } });
  function showToast(msg){ let t=document.createElement('div'); t.className='toast'; t.innerHTML=`<i class="fas fa-check-circle"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
  renderVirtualCards(); updateCardUI(); document.getElementById('dynamicCVV').innerText=dynamicCVV;
</script>
</body>
</html>
