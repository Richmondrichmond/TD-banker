<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunity Checking</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #043D33;
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* Transparent Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(10, 74, 58, 0.8); /* Semi-transparent */
            font-size: 18px;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            backdrop-filter: blur(5px); /* Glass effect */
            color: white;
            z-index: 1000;
        }

        .balance-section {
            text-align: center;
            padding: 100px 10px 20px; /* Adjusted for fixed header */
        }

        .balance-section h1 {
            margin: 10px 0;
            font-size: 26px;
        }

        .balance-section h2 {
            font-size: 20px;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px;
        }

        /* Modern Buttons */
        .button {
            background: linear-gradient(135deg, #177d32, #0E5D26);
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .button:hover {
            background: linear-gradient(135deg, #0E5D26, #177d32);
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .transactions {
            background-color: #fff;
            color: #000;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            margin-top: 30px;
        }

        .transactions h2 {
            font-size: 18px;
            border-bottom: 2px solid #ccc;
            padding-bottom: 5px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ccc;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>Hi, WOLT!</span>
    </div>

    <div class="balance-section">
        <h1>Opportunity Business Checking</h1>
        <h2>Available Balance</h2>
        <p>$39,849,336.33</p>
        <p>Current Balance: <strong>$150,973.19</strong></p>
    </div>

    <div class="buttons">
        <button onclick="window.location.href='Transfer.html';" class="button">Transfer</button>
        <button onclick="window.location.href='Paycheck.html';" class="button">Paycheck</button>
        <button onclick="window.location.href='Withdraw.html';" class="button">Withdraw</button>
        <button onclick="window.location.href='Deposits.html';" class="button">Deposits</button>
        <button onclick="window.location.href='Histories.html';" class="button">Transactions</button>
    </div>

    <div class="transactions">
        <h2>Recent Transactions</h2>

        <h3>Pending</h3>
        <div class="transaction-item">
            <div>
                <strong>Check Hold</strong>
                <p>Mar 09, 2025</p>
            </div>
            <div style="color: red;">-$50,973.19</div>
        </div>

        <h3>Activity</h3>
        <div class="transaction-item">
            <div>
                <strong>Deposit by Check</strong>
                <p>Check hold release 03/16/25</p>
                <p>Mar 09, 2025</p>
            </div>
            <div style="color: green;">+$50,973.19</div>
        </div>
    </div>
</body>
</html>
