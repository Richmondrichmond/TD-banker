<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Account - Check Deposit</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@50;150;300&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #105b37e6;
      color: #151212;
      text-align: center;
    }
    /* Transparent Header */
    header {
            background-color: rgba(0, 107, 18, 0.8); /* Green with slight transparency */
            backdrop-filter: blur(5px);
            color: rgb(119, 141, 23);
            padding: 15px 0px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        header .logo img {
            width: 180px;
            
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            display: inline;
        }

        /* Modern Buttons */
        .nav-button {
            padding: 10px 35px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: 0.3s ease-in-out;
            background: linear-gradient(135deg, #00b64f, #00802b);
            color: rgba(7, 1, 1, 0.945);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .nav-button:hover {
            background: linear-gradient(135deg, #00d956, #009431);
            transform: scale(1.05);
        }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #043D33;
      color: white;
      font-size: 18px;
      position: fixed;
      top: 0;
      width: 100%;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .container {
      padding: 100px 20px 20px;
      max-width: 500px;
      margin: auto;
      background: rgba(246, 247, 246, 0.975);
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(103, 97, 97, 0.9);
    }
    .upload-box {
      padding: 20px;
    }
    input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      margin-bottom: 15px;
    }
    .button {
      background: #14a76c;
      color: #131f0ff0;
      border: none;
      padding: 12px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }
    .button:hover {
      background: #0E5D26;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="header">
    <span>Hi, Thomas!</span>
    <a><button onclick="window.location.href='Amountpage1.html';" class="nav-button">Back</button></a>
  </div>
</div>

</div>
  
  <div class="container">
    <h1>Business Account - Check Deposit</h1>
    <div class="upload-box">
      <h2>Upload Check Image</h2>
      <p>Select a check image to deposit from your mobile, tablet, or computer.</p>
      <input type="file" accept="image/*" capture="environment">
      <button class="button">Submit Check</button>
    </div>
  </div>
</body>
</html>
