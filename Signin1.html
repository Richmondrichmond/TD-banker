<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Coone Bank – Sign In</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --gold:#C9A84C;
      --gold-light:#E8C97A;
      --obsidian:#0A0A0B;
      --panel:#141418;
      --panel-light:#1C1C22;
      --border:rgba(201,168,76,0.25);
      --text-primary:#F0EAD6;
      --text-secondary:#A09880;
    }

    body{
      background:var(--obsidian);
      font-family:'Montserrat',sans-serif;
      color:var(--text-primary);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow-x:hidden;
    }

    body::before{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(201,168,76,0.08), transparent 70%);
      top:-200px;
      right:-200px;
      z-index:-1;
      animation:floatGlow 8s ease-in-out infinite;
    }

    @keyframes floatGlow{
      0%{transform:translateY(0px);}
      50%{transform:translateY(20px);}
      100%{transform:translateY(0px);}
    }

    .container{
      width:100%;
      max-width:480px;
    }

    .signin-card{
      background:var(--panel);
      border:1px solid var(--border);
      padding:45px;
      position:relative;
      overflow:hidden;
      backdrop-filter:blur(10px);
    }

    .signin-card::before{
      content:'';
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:2px;
      background:linear-gradient(to right, transparent, var(--gold), transparent);
    }

    .logo{
      text-align:center;
      font-family:'Cormorant Garamond',serif;
      font-size:40px;
      font-weight:600;
      margin-bottom:10px;
      background:linear-gradient(135deg,#fff,var(--gold-light));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .subtitle{
      text-align:center;
      color:var(--text-secondary);
      font-size:13px;
      letter-spacing:2px;
      margin-bottom:40px;
    }

    .form-group{
      margin-bottom:22px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:11px;
      font-weight:600;
      letter-spacing:0.12em;
      color:var(--text-secondary);
      text-transform:uppercase;
    }

    .input-wrapper{
      position:relative;
    }

    .input-wrapper i{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      color:var(--gold);
      font-size:13px;
    }

    input{
      width:100%;
      background:var(--panel-light);
      border:1px solid var(--border);
      color:var(--text-primary);
      padding:15px 15px 15px 45px;
      font-size:14px;
      transition:0.3s ease;
    }

    input:focus{
      outline:none;
      border-color:var(--gold);
      box-shadow:0 0 10px rgba(201,168,76,0.15);
    }

    .signin-btn{
      width:100%;
      border:none;
      background:linear-gradient(135deg,#B8922A,var(--gold));
      color:var(--obsidian);
      padding:15px;
      font-size:12px;
      font-weight:700;
      letter-spacing:0.15em;
      cursor:pointer;
      transition:0.3s ease;
      margin-top:10px;
    }

    .signin-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(201,168,76,0.2);
    }

    .bottom-links{
      margin-top:25px;
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px;
    }

    .bottom-links a{
      color:var(--text-secondary);
      text-decoration:none;
      font-size:12px;
      transition:0.3s ease;
    }

    .bottom-links a:hover{
      color:var(--gold);
    }

    .secure-badge{
      margin-top:35px;
      text-align:center;
      color:var(--gold);
      font-size:12px;
      border-top:1px solid var(--border);
      padding-top:20px;
      letter-spacing:1px;
    }

    .secure-badge i{
      margin-right:6px;
    }

    .error-message{
      background:rgba(255,0,0,0.08);
      border:1px solid rgba(255,0,0,0.2);
      color:#ffb0b0;
      padding:12px;
      font-size:12px;
      margin-bottom:20px;
      display:none;
    }

    @media(max-width:640px){

      .signin-card{
        padding:30px 22px;
      }

      .logo{
        font-size:32px;
      }

      .subtitle{
        font-size:11px;
      }

    }
  </style>
</head>

<body>

<div class="container">

  <div class="signin-card">

    <div class="logo">
      COONE<span style="color:var(--gold);">BANK</span>
    </div>

    <div class="subtitle">
      SECURE DIGITAL BANKING ACCESS
    </div>

    <div class="error-message" id="errorMessage">
      Invalid email or password
    </div>

    <form id="signinForm">

      <div class="form-group">
        <label>Email Address</label>

        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>

          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>

        <div class="input-wrapper">
          <i class="fas fa-lock"></i>

          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          >
        </div>
      </div>

      <button type="submit" class="signin-btn">
        SIGN IN
      </button>

    </form>

    <div class="bottom-links">
      <a href="#">Forgot Password?</a>
      <a href="signup.html">Create Account</a>
    </div>

    <div class="secure-badge">
      <i class="fas fa-shield-alt"></i>
      Protected by CooneBank Secure Encryption
    </div>

  </div>

</div>

<script>

  const signinForm = document.getElementById('signinForm');
  const errorMessage = document.getElementById('errorMessage');

  signinForm.addEventListener('submit', function(e){

    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    // Demo authentication
    if(email && password){

      const user = {
        name: 'Michael Doe',
        email: email,
        account: 'Premium'
      };

      localStorage.setItem('coone_user', JSON.stringify(user));

      window.location.href = 'dashboard.html';

    } else {

      errorMessage.style.display = 'block';

    }

  });

</script>

</body>
</html>
