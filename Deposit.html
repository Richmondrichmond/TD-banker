<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deposit Funds</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@50;150;300&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #043D33;
      color: rgba(255, 255, 255, 0.9);
      text-align: center;
    }
    /* Transparent Header */
    header {
            background-color: rgba(0, 107, 18, 0.8); /* Green with slight transparency */
            backdrop-filter: blur(5px);
            color: rgb(119, 141, 23);
            padding: 15px 0px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        header .logo img {
            width: 180px;
            
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            display: inline;
        }

        /* Modern Buttons */
        .nav-button {
            padding: 10px 35px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: 0.3s ease-in-out;
            background: linear-gradient(135deg, #00b64f, #00802b);
            color: rgba(7, 1, 1, 0.945);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .nav-button:hover {
            background: linear-gradient(135deg, #00d956, #009431);
            transform: scale(1.05);
        }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(4, 61, 51, 0.7);
      backdrop-filter: blur(8px);
      color: white;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      font-size: 18px;
    }
    .back-button {
      color: white;
      text-decoration: none;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 5px;
      background: #14a76c;
    }
    .container {
      padding: 100px 20px 20px;
      max-width: 500px;
      margin: auto;
      background: rgba(103, 97, 97, 0.9);
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      color: black;
    }
    select, input, button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ddd;
    }
    .button {
      background: #14a76c;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
      text-decoration: none;
      display: inline-block;
    }
    .button:hover {
      background: #0E5D26;
    }
    .fee-info {
      font-size: 14px;
      color: white;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>Hi, Thomas!</span>
    <a><button onclick="window.location.href='Amountpage1.html';" class="nav-button">Back</button></a>
  </div>
  
  <div class="container">
    <h1>Deposit Funds</h1>
    <label for="accountType">Select Account:</label>
    <select id="accountType">
      <option>Personal Account</option>
      <option>Business Checking</option>
    </select>
    
    <label for="depositMethod">Deposit Method:</label>
    <select id="depositMethod">
      <option>ATM Deposit</option>
      <option>Mobile Deposit</option>
      <option>Direct Deposit</option>
      <option>Mail-in Deposit</option>
      <option>Check Deposit</option>
    </select>
    
    <label for="amount">Enter Amount:</label>
    <input type="number" id="amount" placeholder="$0.00" style="width: 80px;">
    
    <p class="fee-info">Please note: Processing times vary based on deposit method.</p>
    
    <a href="deposit-confirmation.html" class="button">Next</a>
  </div>
</body>
</html>
