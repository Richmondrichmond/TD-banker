<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coone Bank — Support Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #050b14 0%, #0a1225 100%); color: #eef2ff; }
    :root { --electric: #2b6ef0; --emerald: #10b981; --card-bg: rgba(12,22,40,0.75); --border-glow: rgba(59,130,246,0.25); }
    .container { max-width: 1440px; margin: 0 auto; padding: 24px 28px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 32px; border-bottom: 1px solid var(--border-glow); padding-bottom: 16px; }
    .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #FFF, #80b3ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .support-badge { background: linear-gradient(135deg, #06b6d420, #2b6ef020); border: 1px solid rgba(6,182,212,0.4); border-radius: 40px; padding: 6px 14px; font-size: 0.7rem; }
    .user-widget { display: flex; align-items: center; gap: 20px; background: rgba(255,255,255,0.03); padding: 6px 18px; border-radius: 80px; border: 1px solid var(--border-glow); }
    .avatar { width: 44px; height: 44px; background: linear-gradient(145deg, #06b6d4, #2b6ef0); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .hero-search { text-align: center; margin-bottom: 48px; }
    .hero-search h1 { font-size: 2.5rem; background: linear-gradient(to right,#fff,#a0c4ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .search-bar { max-width: 600px; margin: 0 auto; position: relative; }
    .search-bar input { width: 100%; background: #0f1a2b; border: 1px solid #2d4263; border-radius: 60px; padding: 16px 24px; color: white; padding-right: 60px; }
    .search-bar button { position: absolute; right: 8px; top: 8px; background: var(--electric); border: none; border-radius: 50px; padding: 8px 20px; color: white; cursor: pointer; }
    .quick-help { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 20px; margin-bottom: 48px; }
    .help-card { background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 28px; padding: 24px; text-align: center; cursor: pointer; border: 1px solid var(--border-glow); }
    .support-tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--border-glow); margin-bottom: 28px; flex-wrap: wrap; }
    .tab-btn { background: none; border: none; padding: 12px 24px; color: #9cb2df; cursor: pointer; }
    .tab-btn.active { background: rgba(43,110,240,0.2); color: white; border-radius: 40px; }
    .tab-content { display: none; animation: fadeIn 0.3s; }
    .tab-content.active-tab { display: block; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .glass-card { background: rgba(8,18,32,0.65); backdrop-filter: blur(14px); border-radius: 32px; padding: 24px; border: 1px solid var(--border-glow); margin-bottom: 24px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 600; }
    .faq-item { background: rgba(15,26,43,0.6); border-radius: 20px; margin-bottom: 12px; padding: 16px 20px; cursor: pointer; }
    .faq-question { display: flex; justify-content: space-between; font-weight: 600; }
    .faq-answer { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-glow); color: #b0c2e3; }
    .faq-item.open .faq-answer { display: block; }
    .chat-widget { position: fixed; bottom: 24px; right: 24px; width: 360px; background: #0a1225; border-radius: 28px; border: 1px solid var(--border-glow); backdrop-filter: blur(20px); z-index: 1000; display: flex; flex-direction: column; }
    .chat-header { background: linear-gradient(135deg, #2b6ef0, #1a4fcf); padding: 16px 20px; border-radius: 28px 28px 0 0; display: flex; justify-content: space-between; cursor: pointer; }
    .chat-messages { height: 300px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .chat-input-area { display: flex; padding: 12px; border-top: 1px solid var(--border-glow); }
    .chat-input-area input { flex: 1; background: #0f1a2b; border: none; border-radius: 40px; padding: 10px 16px; color: white; }
    .message { max-width: 85%; padding: 10px 14px; border-radius: 20px; font-size: 0.85rem; }
    .message.user { align-self: flex-end; background: var(--electric); border-radius: 20px 20px 4px 20px; }
    .message.bot { align-self: flex-start; background: #1e2b3e; border-radius: 20px 20px 20px 4px; }
    .chat-minimized { height: 56px; overflow: hidden; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1100; justify-content: center; align-items: center; }
    .modal-content { background: #0a1225; border-radius: 48px; padding: 32px; max-width: 500px; width: 90%; border: 1px solid var(--border-glow); }
    .btn-primary { background: linear-gradient(105deg, var(--electric), #1a4fcf); border: none; padding: 10px 20px; border-radius: 48px; font-weight: 600; color: white; cursor: pointer; }
    .btn-outline { background: transparent; border: 1px solid var(--electric); padding: 8px 18px; border-radius: 48px; cursor: pointer; color: white; }
    .toast { position: fixed; bottom: 100px; right: 20px; background: #0f212e; padding: 12px 24px; border-radius: 48px; border-left: 4px solid var(--emerald); z-index: 1100; animation: slideIn 0.3s; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @media (max-width:768px){ .container{padding:16px;} .chat-widget{width:300px; right:16px;} .hero-search h1{font-size:1.8rem;} }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="logo">COONE<span style="color:#2b6ef0;">BANK</span> <span style="font-size:0.8rem;">| Support</span></div>
    <div class="support-badge"><i class="fas fa-headset"></i> 24/7 Support</div>
    <div class="user-widget"><i class="fas fa-bell"></i><div class="avatar">AJ</div><span>Alex James</span></div>
  </div>

  <div class="hero-search"><h1>How can we help you?</h1><div class="search-bar"><input type="text" id="searchInput" placeholder="Search..."><button id="searchBtn"><i class="fas fa-search"></i></button></div></div>

  <div class="quick-help">
    <div class="help-card" data-category="account"><i class="fas fa-user-circle"></i><h4>Account</h4></div>
    <div class="help-card" data-category="payments"><i class="fas fa-exchange-alt"></i><h4>Payments</h4></div>
    <div class="help-card" data-category="cards"><i class="fas fa-credit-card"></i><h4>Cards</h4></div>
    <div class="help-card" id="openTicketBtn"><i class="fas fa-ticket-alt"></i><h4>Open Ticket</h4></div>
    <div class="help-card" id="liveChatBtn"><i class="fas fa-comment-dots"></i><h4>Live Chat</h4></div>
  </div>

  <div class="support-tabs">
    <button class="tab-btn active" data-tab="kb">Knowledge Base</button>
    <button class="tab-btn" data-tab="tickets">My Tickets</button>
  </div>

  <div id="kbTab" class="tab-content active-tab"><div class="glass-card"><div class="card-header"><span><i class="fas fa-question-circle"></i> FAQ</span></div><div id="faqList"></div></div></div>
  <div id="ticketsTab" class="tab-content"><div class="glass-card"><div class="card-header"><span><i class="fas fa-ticket-alt"></i> Support Tickets</span><button class="btn-primary" id="newTicketBtn">+ New Ticket</button></div><div id="ticketsList"></div></div></div>
</div>

<div class="chat-widget" id="chatWidget"><div class="chat-header" id="chatHeader"><span><i class="fas fa-robot"></i> Coone AI</span><i class="fas fa-minus" id="minimizeChat"></i></div><div class="chat-messages" id="chatMessages"><div class="message bot">👋 How can I help you?</div></div><div class="chat-input-area"><input type="text" id="chatInput" placeholder="Ask me..."><button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button></div></div>

<div id="ticketModal" class="modal"><div class="modal-content"><span class="close-modal" style="float:right;cursor:pointer;">&times;</span><h3>New Ticket</h3><select id="ticketCategory"><option>Account Issue</option><option>Payment Problem</option></select><input type="text" id="ticketSubject" placeholder="Subject"><textarea id="ticketMessage" rows="4" placeholder="Describe your issue..."></textarea><button id="submitTicketBtn" class="btn-primary">Submit</button></div></div>

<script>
  const faqs = [{q:"How do I reset my password?",a:"Go to Login → Forgot password → Follow email instructions.",cat:"account"},{q:"What are international transfer fees?",a:"0.5% for SWIFT, free for ACH. Premium: 3 free wires/month.",cat:"payments"},{q:"How to freeze my lost card?",a:"Card Management → Toggle freeze switch or contact support.",cat:"cards"}];
  let tickets = [{id:"TKT-001",subject:"Unauthorized transaction",status:"In Progress"}];
  function renderFaqs(filter=""){ let filtered=faqs.filter(f=>filter===""||f.cat.includes(filter)||f.q.toLowerCase().includes(filter)); document.getElementById('faqList').innerHTML=filtered.map(f=>`<div class="faq-item" data-question="${f.q}" data-answer="${f.a}"><div class="faq-question">${f.q} <i class="fas fa-chevron-down"></i></div><div class="faq-answer">${f.a}</div></div>`).join(''); document.querySelectorAll('.faq-item').forEach(el=>el.addEventListener('click',function(){ this.classList.toggle('open'); })); }
  function renderTickets(){ document.getElementById('ticketsList').innerHTML=tickets.map(t=>`<div class="faq-item"><div class="faq-question">#${t.id} - ${t.subject} <span style="color:#f5b041;">${t.status}</span></div></div>`).join(''); }
  renderFaqs(); renderTickets();
  document.querySelectorAll('.help-card[data-category]').forEach(card=>card.addEventListener('click',()=>{ renderFaqs(card.getAttribute('data-category')); document.querySelector('.tab-btn[data-tab="kb"]').click(); }));
  document.getElementById('searchBtn').addEventListener('click',()=>{ renderFaqs(document.getElementById('searchInput').value.toLowerCase()); document.querySelector('.tab-btn[data-tab="kb"]').click(); });
  document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); let tab=btn.getAttribute('data-tab'); document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active-tab')); document.getElementById(`${tab}Tab`).classList.add('active-tab'); }));
  const ticketModal=document.getElementById('ticketModal'); document.getElementById('openTicketBtn').onclick=()=>ticketModal.style.display='flex'; document.getElementById('newTicketBtn').onclick=()=>ticketModal.style.display='flex'; document.querySelectorAll('.close-modal').forEach(el=>el.onclick=()=>ticketModal.style.display='none');
  document.getElementById('submitTicketBtn').onclick=()=>{ let sub=document.getElementById('ticketSubject').value; if(sub){ tickets.unshift({id:`TKT-${Math.floor(Math.random()*1000)}`,subject:sub,status:"Open"}); renderTickets(); ticketModal.style.display='none'; showToast("Ticket submitted"); } };
  // AI Chat
  let chatMinimized=false; const chatWidget=document.getElementById('chatWidget'); document.getElementById('minimizeChat').onclick=()=>{ chatMinimized=!chatMinimized; chatWidget.classList.toggle('chat-minimized'); };
  function addMessage(text,isUser=false){ const div=document.createElement('div'); div.className=`message ${isUser?'user':'bot'}`; div.innerText=text; document.getElementById('chatMessages').appendChild(div); document.getElementById('chatMessages').scrollTop=document.getElementById('chatMessages').scrollHeight; }
  function getBotResponse(msg){ const l=msg.toLowerCase(); if(l.includes("balance")) return "Your current balance is $24,582. View in Dashboard."; if(l.includes("transfer")) return "You can send via ACH (free,1-2d), Wire ($25), or Zelle (instant)."; if(l.includes("card")) return "Go to Card Management to freeze/unfreeze or set limits."; return "I can help with account, payments, cards, or investing. Please clarify."; }
  document.getElementById('sendChatBtn').onclick=()=>{ const inp=document.getElementById('chatInput'); const msg=inp.value.trim(); if(!msg)return; addMessage(msg,true); inp.value=''; setTimeout(()=>addMessage(getBotResponse(msg),false),300); };
  document.getElementById('chatInput').addEventListener('keypress',e=>{if(e.key==='Enter')document.getElementById('sendChatBtn').click();});
  document.getElementById('liveChatBtn').addEventListener('click',()=>{ document.getElementById('chatWidget').style.display='flex'; document.getElementById('chatInput').focus(); });
  function showToast(msg){ const t=document.createElement('div'); t.className='toast'; t.innerHTML=`<i class="fas fa-check-circle"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
</script>
</body>
</html>
