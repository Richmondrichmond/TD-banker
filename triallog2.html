<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TD Bank - Client Login</title>
    <style>
        /* General Styles */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #121212;
            color: #ffffff;
            transition: background 0.3s ease;
        }

        .page-container {
            position: relative;
            min-height: 100vh;
            background: url('besttdb2.png') no-repeat center center/cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 20, 0.3);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box, .account-box {
            max-width: 400px;
            padding: 40px;
            background: rgba(30, 30, 30, 0.9);
            color: white;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .input-container {
            position: relative;
        }

        .input-container input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #555;
            border-radius: 10px;
            font-size: 1rem;
            background: #333;
            color: white;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 2px 4px 8px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: scale(1.05);
        }

        .login-box button {
            background: #00a859;
            color: white;
        }

        .login-box button:active {
            transform: scale(0.95);
        }

        .account-box button {
            background: #4f71d9;
            color: white;
        }

        .account-box button:hover {
            background: #2c41c9;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="overlay"></div>
        <div class="content">
            <div class="login-box" id="loginBox">
                <h1>TD Bank Login</h1>
                <div class="input-container">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="input-container">
                    <input type="password" id="password" placeholder="Password" required>
                    <span class="toggle-password" onclick="togglePassword()">👁</span>
                </div>
                <button id="loginButton" disabled>Login</button>
            </div>
            
            <div class="account-box" id="accountBox" style="display: none;">
                <h1>Welcome, Thomas Johnson!</h1>
                <p><strong>Checking Account:</strong> $50,000</p>
                <p><strong>Savings Account:</strong> $5,000</p>
                <p><strong>Available Balance:</strong> $55,000</p>
                <a href="amountpage.html"><button>Business Account</button></a>
                <button id="logoutButton">Logout</button>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordField = document.getElementById("password");
            passwordField.type = passwordField.type === "password" ? "text" : "password";
        }
    </script>
</body>
</html>
